name: CI — RRM Test Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    name: API Tests (RestAssured)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run API tests
        run: mvn -Dtest=ContactsApiTests test --no-transfer-progress

      - name: Upload Surefire test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: target/surefire-reports/
          retention-days: 7

  ui-tests:
    name: UI Tests (Selenium)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run UI tests (headless Chrome)
        run: mvn -Dtest=DemoblazeUiTests test --no-transfer-progress
        env:
          HEADLESS: true

      - name: Upload Surefire test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: target/surefire-reports/
          retention-days: 7
